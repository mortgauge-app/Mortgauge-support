<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortgauge Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; color: #333; background: #f5f5f5; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 28px; margin-bottom: 10px; }
    p { margin-bottom: 20px; color: #666; }
    .contact-btn { display: inline-block; background: #007AFF; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: 600; }
    .contact-btn:hover { background: #0051D5; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mortgauge Support</h1>
    <p>Need help with the Mortgauge app? We're here to assist you.</p>
    <p>For questions, feedback, or technical support, please contact us:</p>
    <a href="mailto:mortgaugeapp@gmail.com" class="contact-btn">Email Support</a>
    <p style="margin-top: 30px; font-size: 14px;">Mortgauge is a first-home affordability calculator for iOS. All calculations are performed on your device. No account required.</p>
  </div>

</html>
